<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>盛夏鸣蝉 · Summer's Jade</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Montserrat:wght@200;400&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #E0F2F1; 
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-dark: #004D40;
            --text-muted: #80CBC4;
            --accent-summer: #FF7F50; 
            --font-serif: "Noto Serif SC", serif;
            --font-sans: "Montserrat", sans-serif;
            --stone-shape: 40% 60% 50% 50% / 50% 50% 60% 40%;
            --transition-smooth: 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-base); overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }

        .cover-title {
            font-family: var(--font-serif); font-size: 56px; letter-spacing: 0.3em;
            background: linear-gradient(90deg, #26A69A, #FF7F50, #26A69A);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: tideShift 5s linear infinite;
        }
        @keyframes tideShift { to { background-position: 200% center; } }

        #stage-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 8vh 0; box-sizing: border-box;
            z-index: 100; background: var(--bg-base); transition: 1.5s ease-in-out;
        }

        #stage-interaction {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 40; transition: opacity 1.8s;
        }

        .card-frame {
            position: relative; width: 88vw; max-width: 420px; height: 75vh;
            background: var(--bg-card); border-radius: 30px 5px 30px 5px; 
            border: 1px solid rgba(128, 203, 196, 0.3);
            box-shadow: 0 20px 70px rgba(0, 77, 64, 0.1);
            display: flex; flex-direction: column; padding: 50px 35px; box-sizing: border-box;
            transition: all var(--transition-smooth); overflow: hidden;
        }
        .card-frame.video-mode { width: 100vw; max-width: none; height: 100vh; padding: 0; border-radius: 0; border: none;}

        .deco-text {
            position: absolute; font-family: var(--font-sans); font-size: 9px;
            letter-spacing: 0.2em; color: var(--text-muted); opacity: 0;
            transition: 1.5s ease 0.8s;
        }
        .deco-vertical { writing-mode: vertical-rl; }
        .revealed .deco-text { opacity: 0.8; }

        .stone-wrapper {
            position: relative; width: 210px; height: 170px;
            margin: 40px auto 35px auto; display: flex; justify-content: center; align-items: center;
        }

        .stone-inner-core {
            position: absolute; width: 100%; height: 100%; border-radius: var(--stone-shape);
            background: radial-gradient(circle at 30% 30%, #E0F2F1 0%, #4DB6AC 40%, #00897B 80%, #00695C 100%);
            box-shadow: 
                inset -5px -5px 20px rgba(0,0,0,0.1), 
                inset 10px 10px 25px rgba(255,255,255,0.6), 
                0 10px 40px rgba(0, 121, 107, 0.2);
            z-index: 10;
        }

        #scratchCanvas { position: absolute; width: 100%; height: 100%; border-radius: var(--stone-shape); z-index: 20; transition: opacity 1.5s ease; cursor: crosshair; }

        #video-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; display: none; background: #000;
            opacity: 0; transform: scale(1.1);
            transition: opacity 2s ease, transform 3s cubic-bezier(0.1, 0, 0.2, 1);
        }
        #video-layer.active { opacity: 1; transform: scale(1); }
        #zenVideo { width: 100%; height: 100%; object-fit: cover; }

        .card-details { 
            opacity: 0; filter: blur(20px); transform: translateY(15px);
            transition: all 2s ease;
            text-align: center;
        }
        .revealed .card-details { opacity: 1; filter: blur(0); transform: translateY(0); }

        .btn-more {
            margin-top: 40px; background: none; border: 1px solid var(--accent-summer);
            padding: 12px 35px; border-radius: 100px; color: var(--accent-summer);
            font-family: var(--font-serif); font-size: 14px; cursor: pointer; opacity: 0;
            transition: 1.5s ease 1.2s;
        }
        .revealed .btn-more { opacity: 1; }

        .dissolve-item { filter: blur(30px); opacity: 0 !important; transform: translateY(-20px); transition: 1.5s ease; }
        #bubbleCanvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>
    <canvas id="bubbleCanvas"></canvas>
    <audio id="zenAudio" loop preload="auto"><source src="summer_ambient.mp3" type="audio/mpeg"></audio>

    <div id="stage-cover">
        <div style="font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.5em; color: var(--text-muted);">SUMMER JADE</div>
        <div style="text-align:center;">
            <div class="cover-title">盛夏鸣蝉</div>
            <div style="font-family: var(--font-sans); font-size: 11px; color: var(--accent-summer); letter-spacing: 0.6em; margin-top: 5px;">AZURE SERIES</div>
        </div>
        <button onclick="toInteraction()" style="background:none; border:1.5px solid var(--accent-summer); padding:14px 50px; border-radius:100px; cursor:pointer; color: var(--text-dark); font-family: var(--font-serif); font-weight: 500;">拨动湖面</button>
    </div>

    <div id="stage-interaction">
        <div class="card-frame" id="card">
            <div class="deco-text" style="top: 30px; left: 30px;">SEA. 08</div>
            <div class="deco-text deco-vertical" style="top: 30px; right: 30px;">COASTAL ARCHIVE</div>
            <div class="deco-text" style="bottom: 30px; left: 30px;">© 2026 SUMMER</div>

            <div id="video-layer">
                <video id="zenVideo" loop playsinline><source src="3月23日.mp4" type="video/mp4"></video>
            </div>
            
            <div class="stone-wrapper" id="stoneWrapper">
                <div class="stone-inner-core"></div>
                <canvas id="scratchCanvas"></canvas>
            </div>

            <div class="card-details" id="details">
                <div style="font-family: var(--font-serif); font-size: 24px; color: var(--text-dark); line-height: 1.8; font-weight: 300;">浪潮带走喧嚣，<br>只留下蓝色的寂静。</div>
                <button class="btn-more" onclick="triggerVideo()">沉入深蓝</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const card = document.getElementById('card');
        const video = document.getElementById('zenVideo');
        const audio = document.getElementById('zenAudio');
        let isDrawing = false;
        let isRevealed = false;

        function initWaterCanvas() {
            canvas.width = 210; canvas.height = 170;
            ctx.fillStyle = '#E8DFCC';
            ctx.fillRect(0, 0, 210, 170);
            
            for(let i=0; i<200; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random()*0.3})`;
                ctx.fillRect(Math.random()*210, Math.random()*170, 2, 1);
            }
        }

        function toInteraction() {
            audio.volume = 0;
            audio.play().catch(e => {});
            document.getElementById('stage-cover').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('stage-cover').style.display = 'none';
                document.getElementById('stage-interaction').style.opacity = '1';
                document.getElementById('stage-interaction').style.pointerEvents = 'auto';
                initWaterCanvas();
            }, 1000);
        }

        function handleScratch(e) {
            if (!isDrawing || isRevealed) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            const g = ctx.createRadialGradient(x, y, 0, x, y, 32);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(x, y, 32, 0, Math.PI * 2); ctx.fill();
            checkProgress();
        }

        function checkProgress() {
            const data = ctx.getImageData(0, 0, 210, 170).data;
            let transparent = 0;
            for (let i = 3; i < data.length; i += 4) if (data[i] < 150) transparent++;
            if (!isRevealed && (transparent / (data.length / 4)) > 0.48) {
                isRevealed = true;
                canvas.style.opacity = '0';
                setTimeout(() => { card.classList.add('revealed'); }, 400);
            }
        }

        function triggerVideo() {
            document.querySelectorAll('.deco-text').forEach(t => t.style.opacity = '0');
            document.getElementById('details').classList.add('dissolve-item');
            document.getElementById('stoneWrapper').classList.add('dissolve-item');
            
            setTimeout(() => { card.classList.add('video-mode'); }, 600);
            setTimeout(() => {
                const vLayer = document.getElementById('video-layer');
                vLayer.style.display = 'block';
                video.play();
                let vol = 0;
                let fIn = setInterval(() => {
                    if (vol < 0.6) { vol += 0.05; audio.volume = vol; }
                    else clearInterval(fIn);
                }, 150);
                setTimeout(() => { vLayer.classList.add('active'); }, 100);
            }, 1800);
        }

        // 气泡粒子动效
        const bubbleCanvas = document.getElementById('bubbleCanvas');
        const bCtx = bubbleCanvas.getContext('2d');
        let bubbles = [];
        class Bubble {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * bubbleCanvas.width;
                this.y = bubbleCanvas.height + 20;
                this.r = Math.random() * 4 + 1;
                this.speed = Math.random() * 1.5 + 0.5;
                this.drift = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.y -= this.speed;
                this.x += this.drift;
                if (this.y < -20) this.init();
            }
            draw() {
                bCtx.save();
                bCtx.beginPath();
                bCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                bCtx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                bCtx.stroke();
                bCtx.restore();
            }
        }
        window.addEventListener('load', () => {
            bubbleCanvas.width = window.innerWidth; bubbleCanvas.height = window.innerHeight;
            for (let i = 0; i < 40; i++) bubbles.push(new Bubble());
            function animate() {
                bCtx.clearRect(0, 0, bubbleCanvas.width, bubbleCanvas.height);
                bubbles.forEach(b => { b.update(); b.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        });

        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', handleScratch);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleScratch(e); }, {passive:false});
    </script>
</body>
</html>
